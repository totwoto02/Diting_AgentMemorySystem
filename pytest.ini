[pytest]
testpaths = tests/
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::pytest.PytestReturnNotNoneWarning

# 跳过已知问题的测试
addopts = 
    -v
    --cov=diting
    --cov-report=xml
    --cov-report=term-missing
    --ignore=tests/test_memory_correctness.py
    --ignore=tests/test_mock_conversations.py
    --ignore=tests/test_fts5.py
    --ignore=tests/test_step2_integration.py
    --ignore=tests/test_stress.py
    --ignore=tests/test_ultra_long_stress.py
    --ignore=tests/test_kg_integration.py
    --ignore=tests/test_mcp_coverage90.py
    --ignore=tests/test_mcp_phase2.py
    --ignore=tests/test_step2_comprehensive.py
    --ignore=tests/test_multimodal_realistic.py
    --ignore=tests/test_audit.py


